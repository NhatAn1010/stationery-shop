<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Đăng Nhập</title>
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="js/login.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-tabs">
            <button id="login" class="tab-btn active" onclick="switchTab('login')">Đăng nhập</button>
            <button id="register" class="tab-btn" onclick="switchTab('register')">Đăng ký</button>
        </div>

        <form id="login-form" class="auth-form active">
            <h2>Chào mừng trở lại!</h2>
            <div class="input-group email">
                <input id="sign-in-email" type="email" placeholder="Nhập email...">
            </div>
            <div class="input-group pass1" style="position: relative;">
                <input id="sign-in-pass" type="password" placeholder="Nhập mật khẩu">
                <i id="eye1" class="bi bi-eye-slash-fill" onclick="togglePassword()"></i>
            </div>
            <div class="forgot-pass">
                <a href="#">Quên mật khẩu?</a>
            </div>

            <button id="submit-btn" type="button" class="submit-btn" onclick="onPage()">
                ĐĂNG NHẬP   
            </button>
            <small id="help-text-signin"></small>
            
        </form>

        <form id="register-form" class="auth-form">
            <h2>Tạo tài khoản</h2>
            <div class="input-group full-name">
                <input id="fullname" type="text" placeholder="Nhập họ tên của bạn..." >
                <small id="help-text-name"></small>
            </div>
            <div class="input-group email">
                <input id="email" type="email" placeholder="Nhập email của bạn">
                <small id="help-text-email"></small>
            </div>
            <div class="input-group pass" style="position: relative;">
                <input type="password" id="pass2" placeholder="Tạo mật khẩu an toàn...">
                <i id="eye2" class="bi bi-eye-slash-fill" onclick="togglePassword()"></i>
            </div>
            <div class="text-pass">
                <small id="help-text-pass"></small>
            </div>
            
            <button id="new-register" type="button" class="submit-btn">ĐĂNG KÝ MỚI</button>
            <small id="help-text-regis"></small>
        </form>
    </div>
    
</body>
</html>
